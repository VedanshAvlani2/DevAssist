<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevAssist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 8px;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .repo-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .repo-bar input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }
    .repo-bar input:focus { border-color: var(--accent); }
    .repo-bar input::placeholder { color: var(--text2); }

    button {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-danger { background: var(--red); }
    .btn-success { background: var(--green); }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

    .status-pill {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-idle    { background: var(--bg3); color: var(--text2); }
    .status-indexing { background: #2d2a00; color: var(--yellow); }
    .status-ready   { background: #0d2d1a; color: var(--green); }
    .status-error   { background: #2d0d0d; color: var(--red); }

    /* ── Main layout ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat pane ── */
    .chat-pane {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      border-right: 1px solid var(--border);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .message-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user .message-bubble {
      background: #1c2d47;
      border: 1px solid #2a4060;
    }
    .message.assistant .message-bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
    }

    .message-meta {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
      padding: 0 4px;
    }
    .message.user .message-meta { text-align: right; }

    code { font-family: var(--font-mono); background: var(--bg3); padding: 1px 5px; border-radius: 4px; font-size: 12px; }

    .approve-btn {
      margin-top: 10px;
      font-size: 13px;
      padding: 8px 16px;
    }

    .pr-link {
      margin-top: 8px;
      font-size: 13px;
    }
    .pr-link a { color: var(--accent); text-decoration: none; }
    .pr-link a:hover { text-decoration: underline; }

    /* ── Input bar ── */
    .input-bar {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      background: var(--bg2);
      flex-shrink: 0;
    }

    .input-bar textarea {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      min-height: 44px;
      max-height: 140px;
      overflow-y: auto;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--text2); }

    .send-btn { align-self: flex-end; padding: 10px 20px; }

    /* ── Diff pane ── */
    .diff-pane {
      width: 45%;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
    }

    .diff-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .diff-header span { font-family: var(--font-mono); font-size: 12px; color: var(--text); }

    .diff-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .diff-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text2);
      font-size: 14px;
      text-align: center;
      padding: 40px;
      line-height: 1.8;
    }

    .diff-line {
      display: block;
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 1px 16px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
    .diff-line.add { background: #0d2d1a; color: #3fb950; }
    .diff-line.remove { background: #2d0d0d; color: #f85149; }
    .diff-line.meta { background: #1c2d3e; color: #58a6ff; }
    .diff-line.normal { color: var(--text2); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡ DevAssist</div>
  <div class="repo-bar">
    <input id="repoInput" type="text" placeholder="https://github.com/owner/repo" />
    <button id="indexBtn" onclick="indexRepo()">Index Repo</button>
    <span id="statusPill" class="status-pill status-idle">Idle</span>
  </div>
  <button class="btn-secondary" onclick="clearHistory()" title="Clear conversation">Clear</button>
</header>

<main>
  <!-- Chat pane -->
  <div class="chat-pane">
    <div class="messages" id="messages">
      <div style="color:var(--text2);font-size:13px;text-align:center;margin-top:40px;line-height:2">
        Index a GitHub repo above, then describe a change.<br>
        DevAssist will retrieve context, generate code, and show you a diff.<br>
        You approve before anything is pushed.
      </div>
    </div>
    <div class="input-bar">
      <textarea id="msgInput" placeholder="Describe a change… (Shift+Enter for new line)" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Diff pane -->
  <div class="diff-pane">
    <div class="diff-header">
      <span>Diff</span>
      <span id="diffFile"></span>
    </div>
    <div class="diff-body" id="diffBody">
      <div class="diff-empty">No diff yet.<br>Send a message to generate code changes.</div>
    </div>
  </div>
</main>

<script>
  let currentMessageId = null;
  let indexingPoll = null;

  // ── Repo indexing ─────────────────────────────────────────────────────────

  async function indexRepo() {
    const url = document.getElementById('repoInput').value.trim();
    if (!url) { alert('Enter a GitHub repo URL first.'); return; }

    setStatus('indexing', 'Indexing…');
    document.getElementById('indexBtn').disabled = true;

    await fetch('/repo/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ github_url: url })
    });

    // Poll until ready or error
    indexingPoll = setInterval(async () => {
      const res = await fetch('/repo/status');
      const data = await res.json();
      if (data.status === 'ready') {
        clearInterval(indexingPoll);
        setStatus('ready', data.message);
        document.getElementById('indexBtn').disabled = false;
      } else if (data.status === 'error') {
        clearInterval(indexingPoll);
        setStatus('error', 'Error: ' + data.message);
        document.getElementById('indexBtn').disabled = false;
      } else {
        setStatus('indexing', data.message || 'Indexing…');
      }
    }, 2000);
  }

  function setStatus(type, msg) {
    const pill = document.getElementById('statusPill');
    pill.className = `status-pill status-${type}`;
    const icons = { idle: '', indexing: '⏳ ', ready: '✓ ', error: '✗ ' };
    pill.textContent = (icons[type] || '') + msg;
  }

  // ── Chat ──────────────────────────────────────────────────────────────────

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', msg);
    const thinkingId = appendThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });

      const data = await res.json();
      removeThinking(thinkingId);

      if (data.error || data.detail) {
        appendMessage('assistant', '❌ ' + (data.detail || data.error));
      } else {
        currentMessageId = data.message_id;
        appendAssistantMessage(data.message_id, data.assistant, data.target_file);
        renderDiff(data.diff, data.target_file);
      }
    } catch (e) {
      removeThinking(thinkingId);
      appendMessage('assistant', '❌ Network error: ' + e.message);
    }

    document.getElementById('sendBtn').disabled = false;
  }

  async function approvePR(messageId) {
    const btn = document.getElementById('approve-' + messageId);
    if (btn) { btn.disabled = true; btn.textContent = 'Pushing…'; }

    const res = await fetch(`/chat/approve/${messageId}`, { method: 'POST' });
    const data = await res.json();

    if (btn) btn.remove();

    const container = document.getElementById('pr-' + messageId);
    if (container) {
      if (data.result && data.result.startsWith('SUCCESS')) {
        const url = data.result.replace('SUCCESS: PR created at ', '').trim();
        container.innerHTML = `✅ <a href="${url}" target="_blank">${url}</a>`;
      } else {
        container.textContent = '❌ ' + (data.result || 'Unknown error');
        container.style.color = 'var(--red)';
      }
    }
  }

  async function clearHistory() {
    if (!confirm('Clear all conversation history?')) return;
    await fetch('/chat/history', { method: 'DELETE' });
    document.getElementById('messages').innerHTML = '';
    document.getElementById('diffBody').innerHTML = '<div class="diff-empty">No diff yet.<br>Send a message to generate code changes.</div>';
    document.getElementById('diffFile').textContent = '';
    currentMessageId = null;
  }

  // ── Message rendering ─────────────────────────────────────────────────────

  function appendMessage(role, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
      <div class="message-bubble">${escapeHtml(text)}</div>
      <div class="message-meta">${new Date().toLocaleTimeString()}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function appendAssistantMessage(messageId, text, targetFile) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';

    // Convert **bold** and `code` in text
    const formatted = escapeHtml(text)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>');

    div.innerHTML = `
      <div class="message-bubble">
        ${formatted}
        <div style="margin-top:12px">
          <button class="btn-success approve-btn" id="approve-${messageId}" onclick="approvePR('${messageId}')">
            🚀 Approve &amp; Push PR
          </button>
        </div>
        <div class="pr-link" id="pr-${messageId}"></div>
      </div>
      <div class="message-meta">${new Date().toLocaleTimeString()}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function appendThinking() {
    const container = document.getElementById('messages');
    const id = 'thinking-' + Date.now();
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = id;
    div.innerHTML = `
      <div class="message-bubble" style="color:var(--text2)">
        <span class="spinner"></span>Agents working…
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return id;
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  // ── Diff rendering ────────────────────────────────────────────────────────

  function renderDiff(diff, targetFile) {
    const body = document.getElementById('diffBody');
    document.getElementById('diffFile').textContent = targetFile || '';

    if (!diff || diff.trim() === '' || diff.includes('No changes detected')) {
      body.innerHTML = '<div class="diff-empty">No changes detected.</div>';
      return;
    }

    const lines = diff.split('\n');
    const html = lines.map(line => {
      if (line.startsWith('+') && !line.startsWith('+++')) {
        return `<span class="diff-line add">${escapeHtml(line)}</span>`;
      } else if (line.startsWith('-') && !line.startsWith('---')) {
        return `<span class="diff-line remove">${escapeHtml(line)}</span>`;
      } else if (line.startsWith('@@') || line.startsWith('---') || line.startsWith('+++')) {
        return `<span class="diff-line meta">${escapeHtml(line)}</span>`;
      } else {
        return `<span class="diff-line normal">${escapeHtml(line)}</span>`;
      }
    }).join('');

    body.innerHTML = html;
    body.scrollTop = 0;
  }

  // ── Utilities ─────────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Load history on page open ─────────────────────────────────────────────

  async function loadHistory() {
    const [histRes, statusRes] = await Promise.all([
      fetch('/chat/history'),
      fetch('/repo/status')
    ]);
    const history = await histRes.json();
    const status = await statusRes.json();

    if (status.status !== 'idle') {
      setStatus(status.status, status.message);
      if (status.repo) {
        document.getElementById('repoInput').value =
          'https://github.com/' + status.repo;
      }
    }

    if (history.length > 0) {
      document.getElementById('messages').innerHTML = '';
      for (const turn of history) {
        appendMessage('user', turn.user);
        if (turn.pr_url && turn.pr_url.startsWith('SUCCESS')) {
          const url = turn.pr_url.replace('SUCCESS: PR created at ', '').trim();
          const container = document.getElementById('messages');
          const div = document.createElement('div');
          div.className = 'message assistant';
          div.innerHTML = `
            <div class="message-bubble">
              ${escapeHtml(turn.assistant).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\`(.+?)\`/g, '<code>$1</code>')}
              <div class="pr-link" style="margin-top:8px">✅ <a href="${url}" target="_blank">${url}</a></div>
            </div>
            <div class="message-meta">${new Date(turn.timestamp).toLocaleTimeString()}</div>
          `;
          container.appendChild(div);
        } else {
          appendAssistantMessage(turn.id, turn.assistant, turn.target_file);
        }
      }

      // Show the last diff
      const last = history[history.length - 1];
      if (last.diff) renderDiff(last.diff, last.target_file);
    }
  }

  loadHistory();
</script>
</body>
</html>
